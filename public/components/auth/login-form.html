<section class="auth-card">
  <div class="d-flex flex-column gap-3">
    <div class="d-flex flex-column gap-1">
      <!-- <img src="assets/images/logoCintas2.webp" alt="cintas"> -->
      <h3 class="m-0">Entrar</h3>
      <h6 class="text-secondary m-0">Acesse sua conta para continuar.</h6>
    </div>

    <div id="loginAlert"></div>

    <form id="loginForm" class="d-flex flex-column gap-3" novalidate>
      <div class="d-flex flex-column gap-1">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" name="email" type="email" class="form-control" autocomplete="email" required />
      </div>

      <div class="d-flex flex-column gap-1">
        <label for="loginPassword">Senha</label>
        <input
          id="loginPassword"
          name="password"
          type="password"
          class="form-control"
          autocomplete="current-password"
          required
        />
      </div>

      <button id="loginSubmit" type="submit" class="btn ">
        <span class="me-2"><i class="bi bi-box-arrow-in-right"></i></span>
        Entrar
      </button>
    </form>
    <hr class="text-black-50">
    <div class="d-flex justify-content-between align-items-center">
      <a class="" href="register.html">Criar conta</a>
      <a class="" href="./">Voltar</a>
    </div>
  </div>
</section>
