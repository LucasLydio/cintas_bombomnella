<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Minha conta | Cintas Bombomnella</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

    <link rel="stylesheet" href="/assets/css/global.css" />
    <link rel="stylesheet" href="/assets/css/typography.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/pages/user.css" />

    <link rel="icon" href="/assets/images/logoCintas.webp" type="image/webp" />
  </head>
  <body class="user">
    <div data-include="/components/layout/header.html"></div>
    <div data-include="/components/layout/sidebar.html"></div>

    <main class="main py-3">
      <div class="container-user">
        <div class="d-flex justify-content-center">
          <div class="account-card w-100">
            <div class="d-flex justify-content-between align-items-center gap-3">
              <div class="d-flex flex-column">
                <h4 class="m-0">Minha conta</h4>
                <p class="text-secondary m-0">Sessao atual</p>
              </div>
              <button id="logoutBtn" class="btn btn-outline-dark">
                <i class="bi bi-box-arrow-right me-2"></i>Sair
              </button>
            </div>

            <hr />

            <div id="userAlert"></div>

            <div class="d-flex flex-column gap-2">
              <div class="d-flex gap-2">
                <strong>Nome:</strong>
                <span id="userName">-</span>
              </div>
              <div class="d-flex gap-2">
                <strong>Email:</strong>
                <span id="userEmail">-</span>
              </div>
              <div class="d-flex gap-2">
                <strong>Role:</strong>
                <span id="userRole">-</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div data-include="/components/layout/footer.html"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/assets/js/components/include.js"></script>
    <script type="module" src="/assets/js/pages/user.js"></script>
  </body>
</html>
